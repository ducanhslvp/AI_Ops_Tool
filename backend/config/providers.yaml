active_provider: ${ACTIVE_PROVIDER:-codex}
fallback_providers: []
retries: 0
retry_base_delay_seconds: 0.25
request_timeout_seconds: 90
max_tool_rounds: 100
providers:
  codex:
    type: codex
    enabled: true
    model: ${CODEX_MODEL:-}
    mode: ${CODEX_MODE:-cli}
    executable: ${CODEX_EXECUTABLE:-codex}
    timeout_seconds: 120
    extra:
      ephemeral: false
      verify_authentication: false
      max_output_bytes: 2000000
